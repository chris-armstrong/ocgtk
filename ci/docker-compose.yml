x-build-args: &build-args
  args:
    OPAM_VERSION: ${OPAM_VERSION}
    OCAML_VERSION: ${OCAML_VERSION}

services:
  ubuntu22:
    build:
      context: ..
      dockerfile: ci/ubuntu22.Dockerfile
      <<: *build-args
    volumes:
      - ..:/workspace:cached
      - ubuntu22-build:/build
    working_dir: /workspace
    command: sleep infinity
    tty: true

  debian12:
    build:
      context: ..
      dockerfile: ci/debian12.Dockerfile
      <<: *build-args
    volumes:
      - ..:/workspace:cached
      - debian12-build:/build
