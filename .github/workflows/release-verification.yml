name: Release Verification

# Manually triggered, or automatically on release tags.
on:
  workflow_dispatch:
    inputs:
      windows_only:
        description: 'Run Windows job only (skip all other platforms)'
        type: boolean
        default: false
  push:
    tags: ['v*']

env:
  OCAML_VERSION: '5.3.0'
  OPAM_VERSION: '2.5.0'

permissions:
  contents: write   # needed by the `package` job to publish a GitHub Release

jobs:

  # ── Ubuntu 22.04 (native runner) ────────────────────────────────────────────
  ubuntu-22:
    name: Ubuntu 22.04
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make m4 patch unzip bzip2 curl git pkg-config perl diffutils rsync \
            libgtk-4-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev libglib2.0-dev \
            libgirepository1.0-dev gir1.2-gtk-4.0 xvfb
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
      - name: Pin conf-gtk4 and install dependencies
        run: |
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only --with-test -y ./ocgtk ./gir_gen
      - name: Build
        run: opam exec -- dune build
      - name: Test gir_gen
        run: opam exec -- dune test gir_gen/
      - name: Test ocgtk
        run: opam exec -- xvfb-run -a dune test ocgtk/

  # ── Ubuntu 24.04 (native runner) ────────────────────────────────────────────
  ubuntu-24:
    name: Ubuntu 24.04
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make m4 patch unzip bzip2 curl git pkg-config perl diffutils rsync \
            libgtk-4-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev libglib2.0-dev \
            libgirepository1.0-dev gir1.2-gtk-4.0 xvfb
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
      - name: Pin conf-gtk4 and install dependencies
        run: |
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only --with-test -y ./ocgtk ./gir_gen
      - name: Build
        run: opam exec -- dune build
      - name: Test gir_gen
        run: opam exec -- dune test gir_gen/
      - name: Test ocgtk
        run: opam exec -- xvfb-run -a dune test ocgtk/

  # ── APT-based containers (Ubuntu 25.04, Debian 12) ──────────────────────────
  linux-apt:
    name: ${{ matrix.name }}
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 25.04
            image: ubuntu:25.04
          - name: Debian 12
            image: debian:12
    steps:
      - name: Install git and curl
        run: apt-get update && apt-get install -y git curl ca-certificates
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get install -y \
            gcc make m4 patch unzip bzip2 pkg-config perl diffutils rsync \
            libgtk-4-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev libglib2.0-dev \
            libgirepository1.0-dev gir1.2-gtk-4.0 xvfb
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf-gtk4 and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only --with-test -y ./ocgtk ./gir_gen
      - name: Build
        run: |
          eval $(opam env)
          dune build
      - name: Test gir_gen
        run: |
          eval $(opam env)
          dune test gir_gen/
      - name: Test ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune test ocgtk/

  # ── Fedora containers (Fedora 40, Fedora 43) ─────────────────────────────────
  linux-fedora:
    name: ${{ matrix.name }}
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fedora 40
            image: fedora:40
          - name: Fedora 43
            image: fedora:43
    steps:
      - name: Install git and curl
        run: dnf install -y git curl
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc make m4 patch unzip bzip2 pkgconf perl diffutils which rsync \
            gtk4-devel cairo-devel pango-devel gdk-pixbuf2-devel glib2-devel \
            gobject-introspection-devel xorg-x11-server-Xvfb
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf-gtk4 and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only --with-test -y ./ocgtk ./gir_gen
      - name: Build
        run: |
          eval $(opam env)
          dune build
      - name: Test gir_gen
        run: |
          eval $(opam env)
          dune test gir_gen/
      - name: Test ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune test ocgtk/

  # ── CentOS Stream 9 ──────────────────────────────────────────────────────────
  centos-9:
    name: CentOS Stream 9
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: quay.io/centos/centos:stream9
    steps:
      - name: Enable EPEL + CRB and install git/curl
        run: |
          dnf install -y epel-release
          dnf config-manager --set-enabled crb
          dnf install -y --allowerasing git curl
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing \
            gcc make m4 patch unzip bzip2 pkgconf-pkg-config perl diffutils which rsync \
            gtk4-devel cairo-devel pango-devel gdk-pixbuf2-devel glib2-devel \
            gobject-introspection-devel xorg-x11-server-Xvfb
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf-gtk4 and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only --with-test -y ./ocgtk ./gir_gen
      - name: Build
        run: |
          eval $(opam env)
          dune build
      - name: Test gir_gen
        run: |
          eval $(opam env)
          dune test gir_gen/
      - name: Test ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune test ocgtk/

  # ── openSUSE Leap 15.6 ───────────────────────────────────────────────────────
  opensuse-15:
    name: openSUSE Leap 15.6
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: opensuse/leap:15.6
    steps:
      - name: Install git and curl
        run: zypper install -y git curl
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          zypper install -y \
            gcc make m4 patch unzip bzip2 gzip tar pkg-config pkgconf perl diffutils which rsync \
            gtk4-devel cairo-devel pango-devel gdk-pixbuf-devel glib2-devel \
            gobject-introspection-devel xorg-x11-server-Xvfb xvfb-run
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf-gtk4 and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only --with-test -y ./ocgtk ./gir_gen
      - name: Build
        run: |
          eval $(opam env)
          dune build
      - name: Test gir_gen
        run: |
          eval $(opam env)
          dune test gir_gen/
      - name: Test ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune test ocgtk/

  # ── macOS (Homebrew) ─────────────────────────────────────────────────────────
  macos:
    name: macOS (Homebrew)
    if: ${{ !inputs.windows_only }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: brew install gtk4 gobject-introspection pkgconf
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
      - name: Pin conf-gtk4 and install dependencies
        run: |
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only --with-test -y ./ocgtk ./gir_gen
      - name: Build
        run: opam exec -- dune build
      - name: Test gir_gen
        run: opam exec -- dune test gir_gen/
      - name: Test ocgtk
        run: opam exec -- dune test ocgtk/

  # ── FreeBSD 14 ───────────────────────────────────────────────────────────────
  # Disabled: FreeBSD runs on QEMU on GitHub runners which lack processor
  # virtualisation extensions, making it too slow and prone to timeouts.
  freebsd:
    name: FreeBSD 14
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y \
              gtk4 gobject-introspection pkgconf \
              bash gcc gmake m4 patch unzip bzip2 curl git perl5 rsync \
              xorg-vfbserver
          run: |
            set -e
            curl -fsSL \
              "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-freebsd" \
              -o /usr/local/bin/opam
            chmod +x /usr/local/bin/opam
            opam init --disable-sandboxing -y --bare
            opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
            eval $(opam env)
            opam pin add -n conf-gtk4 conf-gtk4
            opam install --deps-only --with-test -y ./ocgtk ./gir_gen
            dune build
            dune test gir_gen/
            # xvfb-run is not available on FreeBSD; start Xvfb manually
            Xvfb :99 -screen 0 1280x1024x24 &
            sleep 1
            DISPLAY=:99 dune test ocgtk/

  # ── Windows ──────────────────────────────────────────────────────────────────
  #
  # Setup model: MSYS2 shell + MinGW64 compiler + MSYS2 GTK4 libraries.
  #
  # windows-environment: msys2 tells setup-ocaml to use the pre-installed MSYS2
  # on the GitHub runner instead of Cygwin. Combined with windows-compiler: mingw,
  # the OCaml compiler, shell, and GTK4 libraries all live in the same MSYS2
  # MINGW64 prefix — no cross-environment pkg-config bridging required.
  #
  # Build only: GTK tests require a display; Windows CI validates compilation.
  windows:
    name: Windows (MSYS2/MinGW64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Install GTK4 and its dependencies into the MSYS2 MINGW64 prefix.
      - name: Install GTK4 via MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-gobject-introspection
            mingw-w64-x86_64-pkgconf

      # windows-environment: msys2 uses the pre-installed MSYS2 as the build
      # shell, so pkg-config sees MINGW64 packages without any path bridging.
      - name: Set up OCaml (MinGW64 compiler, MSYS2 shell)
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
          windows-compiler: mingw
          windows-environment: msys2

      - name: Pin conf-gtk4 and install OCaml dependencies
        run: |
          opam pin add -n conf-gtk4 conf-gtk4
          opam install --deps-only -y ./ocgtk

      - name: Build
        run: opam exec -- dune build @ocgtk/install

  # ── Package + publish release ────────────────────────────────────────────────
  #
  # Only fires on an actual tag push (not workflow_dispatch), and only after
  # every platform verification job above has passed. Builds a tarball whose
  # root is the `ocgtk/` subtree (so dune-project / *.install end up at the
  # tarball root, where opam expects them) plus LICENSE/LGPL, and publishes it
  # as a GitHub Release asset. opam-repository submissions must point url.src
  # at this asset, not GitHub's auto-generated "Source code" archive, which
  # still contains the whole monorepo.
  package:
    name: Package release tarball
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - ubuntu-22
      - ubuntu-24
      - linux-apt
      - linux-fedora
      - centos-9
      - opensuse-15
      - macos
      - windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ocgtk-only release tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="ocgtk-$VERSION"
          STAGE="$(mktemp -d)/$PKG"
          mkdir -p "$STAGE"

          # ocgtk/ subtree becomes the tarball root (fixes dune-project /
          # *.install being one directory too deep for opam).
          git archive "$GITHUB_REF_NAME:ocgtk" | tar -x -C "$STAGE"
          # Fold in the repo-root license files alongside it.
          git archive "$GITHUB_REF_NAME" -- LICENSE LGPL | tar -x -C "$STAGE"

          tar -czf "$PKG.tar.gz" -C "$(dirname "$STAGE")" "$PKG"
          sha256sum "$PKG.tar.gz" > "$PKG.tar.gz.sha256"

          echo "PKG=$PKG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          # Tag versions use '-' (v0.1-preview2); CHANGELOG headings use '~'
          # (## [0.1~preview2]), matching the dune-project/opam version format.
          CHANGELOG_VERSION="${VERSION/-/~}"
          awk -v ver="$CHANGELOG_VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $CHANGELOG_VERSION"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, 'preview') }}
          files: |
            ${{ env.PKG }}.tar.gz
            ${{ env.PKG }}.tar.gz.sha256
