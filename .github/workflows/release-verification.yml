name: Release Verification

# Manually triggered, or automatically on release tags.
on:
  workflow_dispatch:
    inputs:
      windows_only:
        description: 'Run only the Windows job (for faster iteration)'
        required: false
        default: false
        type: boolean
  push:
    tags: ['v*']

env:
  OCAML_VERSION: '5.3.0'
  OPAM_VERSION: '2.5.0'

jobs:

  # ── Ubuntu 22.04 (native runner) ────────────────────────────────────────────
  ubuntu-22:
    name: Ubuntu 22.04
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make m4 patch unzip bzip2 curl git pkg-config perl diffutils rsync \
            libgtk-4-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev libglib2.0-dev \
            libgirepository1.0-dev gir1.2-gtk-4.0 xvfb
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
      - name: Pin conf packages and install dependencies
        run: |
          opam pin add -n conf-gtk4 conf-gtk4
          opam pin add -n conf-mingw-w64-gtk4-x86_64 conf-mingw-w64-gtk4-x86_64
          opam install --deps-only --with-test -y ./ocgtk
      - name: Build
        working-directory: ocgtk
        run: opam exec -- dune build
      - name: Test
        working-directory: ocgtk
        run: opam exec -- xvfb-run -a dune runtest

  # ── Ubuntu 24.04 (native runner) ────────────────────────────────────────────
  ubuntu-24:
    name: Ubuntu 24.04
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make m4 patch unzip bzip2 curl git pkg-config perl diffutils rsync \
            libgtk-4-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev libglib2.0-dev \
            libgirepository1.0-dev gir1.2-gtk-4.0 xvfb
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
      - name: Pin conf packages and install dependencies
        run: |
          opam pin add -n conf-gtk4 conf-gtk4
          opam pin add -n conf-mingw-w64-gtk4-x86_64 conf-mingw-w64-gtk4-x86_64
          opam install --deps-only --with-test -y ./ocgtk
      - name: Build
        working-directory: ocgtk
        run: opam exec -- dune build
      - name: Test
        working-directory: ocgtk
        run: opam exec -- xvfb-run -a dune runtest

  # ── APT-based containers (Ubuntu 25.04, Debian 12) ──────────────────────────
  linux-apt:
    name: ${{ matrix.name }}
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 25.04
            image: ubuntu:25.04
          - name: Debian 12
            image: debian:12
    steps:
      - name: Install git and curl
        run: apt-get update && apt-get install -y git curl ca-certificates
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get install -y \
            gcc make m4 patch unzip bzip2 pkg-config perl diffutils rsync \
            libgtk-4-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev libglib2.0-dev \
            libgirepository1.0-dev gir1.2-gtk-4.0 xvfb
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf packages and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam pin add -n conf-mingw-w64-gtk4-x86_64 conf-mingw-w64-gtk4-x86_64
          opam install --deps-only --with-test -y ./ocgtk
      - name: Build
        working-directory: ocgtk
        run: |
          eval $(opam env)
          dune build
      - name: Test
        working-directory: ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune runtest

  # ── Fedora containers (Fedora 40, Fedora 43) ─────────────────────────────────
  linux-fedora:
    name: ${{ matrix.name }}
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fedora 40
            image: fedora:40
          - name: Fedora 43
            image: fedora:43
    steps:
      - name: Install git and curl
        run: dnf install -y git curl
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc make m4 patch unzip bzip2 pkgconf perl diffutils which rsync \
            gtk4-devel cairo-devel pango-devel gdk-pixbuf2-devel glib2-devel \
            gobject-introspection-devel xorg-x11-server-Xvfb
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf packages and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam pin add -n conf-mingw-w64-gtk4-x86_64 conf-mingw-w64-gtk4-x86_64
          opam install --deps-only --with-test -y ./ocgtk
      - name: Build
        working-directory: ocgtk
        run: |
          eval $(opam env)
          dune build
      - name: Test
        working-directory: ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune runtest

  # ── CentOS Stream 9 ──────────────────────────────────────────────────────────
  centos-9:
    name: CentOS Stream 9
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: quay.io/centos/centos:stream9
    steps:
      - name: Enable EPEL + CRB and install git/curl
        run: |
          dnf install -y epel-release
          dnf config-manager --set-enabled crb
          dnf install -y --allowerasing git curl
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing \
            gcc make m4 patch unzip bzip2 pkgconf-pkg-config perl diffutils which rsync \
            gtk4-devel cairo-devel pango-devel gdk-pixbuf2-devel glib2-devel \
            gobject-introspection-devel xorg-x11-server-Xvfb
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf packages and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam pin add -n conf-mingw-w64-gtk4-x86_64 conf-mingw-w64-gtk4-x86_64
          opam install --deps-only --with-test -y ./ocgtk
      - name: Build
        working-directory: ocgtk
        run: |
          eval $(opam env)
          dune build
      - name: Test
        working-directory: ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune runtest

  # ── openSUSE Leap 15.6 ───────────────────────────────────────────────────────
  opensuse-15:
    name: openSUSE Leap 15.6
    if: ${{ !inputs.windows_only }}
    runs-on: ubuntu-latest
    container: opensuse/leap:15.6
    steps:
      - name: Install git and curl
        run: zypper install -y git curl
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          zypper install -y \
            gcc make m4 patch unzip bzip2 gzip tar pkg-config perl diffutils which rsync \
            gtk4-devel cairo-devel pango-devel gdk-pixbuf-devel glib2-devel \
            gobject-introspection-devel xorg-x11-server-Xvfb xvfb-run
      - name: Install opam
        run: |
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${{ env.OPAM_VERSION }}/opam-${{ env.OPAM_VERSION }}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
      - name: Initialise opam and create switch
        run: |
          opam init --disable-sandboxing -y --bare
          opam switch create default "ocaml-base-compiler.${{ env.OCAML_VERSION }}" -y
      - name: Pin conf packages and install OCaml dependencies
        run: |
          eval $(opam env)
          opam pin add -n conf-gtk4 conf-gtk4
          opam pin add -n conf-mingw-w64-gtk4-x86_64 conf-mingw-w64-gtk4-x86_64
          opam install --deps-only --with-test -y ./ocgtk
      - name: Build
        working-directory: ocgtk
        run: |
          eval $(opam env)
          dune build
      - name: Test
        working-directory: ocgtk
        run: |
          eval $(opam env)
          xvfb-run -a dune runtest

  # ── Windows ──────────────────────────────────────────────────────────────────
  #
  # Setup model: opam's internal Cygwin + MinGW64 compiler + MSYS2 GTK4 libs.
  #
  # setup-ocaml uses its own internal Cygwin as the build shell.  With
  # windows-compiler: mingw the OCaml compiler targets the MinGW64 ABI
  # (x86_64-w64-mingw32), making it binary-compatible with MSYS2 MINGW64
  # libraries including GTK4.
  #
  # Because opam's Cygwin is isolated from the MSYS2 installation where
  # GTK4 lives, we set PKG_CONFIG_PATH so that pkgconf (installed by
  # conf-pkg-config inside opam's Cygwin) can find the MINGW64 .pc files
  # at C:\msys64\mingw64\lib\pkgconfig.
  windows:
    name: Windows
    runs-on: windows-latest
    env:
      # Bridge opam's pkgconf to the MSYS2 MINGW64 prefix where GTK4 is
      # installed.  Without this, pkgconf cannot find gtk4.pc and friends.
      PKG_CONFIG_PATH: C:/msys64/mingw64/lib/pkgconfig
    steps:
      - uses: actions/checkout@v4

      # Install GTK4 and its dependencies into the MSYS2 MINGW64 prefix.
      # The GitHub Actions Windows runner ships MSYS2 at C:\msys64 so these
      # packages land in C:\msys64\mingw64\.
      - name: Install GTK4 via MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-gobject-introspection

      # Set up OCaml via opam on Windows.
      # windows-compiler: mingw  → OCaml built with MinGW64 GCC (native
      #                            Windows binaries, ABI-compatible with
      #                            MSYS2 MINGW64 libraries including GTK4).
      - name: Set up OCaml (MinGW64 compiler)
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
          windows-compiler: mingw

      - name: Pin conf packages and install OCaml dependencies
        run: |
          opam pin add -n conf-gtk4 conf-gtk4
          opam pin add -n conf-mingw-w64-gtk4-x86_64 conf-mingw-w64-gtk4-x86_64
          opam install --deps-only --with-test -y ./ocgtk

      - name: Build
        working-directory: ocgtk
        run: opam exec -- dune build

      - name: Test
        working-directory: ocgtk
        # Windows runners have a native display; no virtual framebuffer needed
        run: opam exec -- dune runtest
